name: Sync Product Social Links
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install firebase-admin

      - name: Generate Redirect Files
        shell: python
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          import os, re, json, urllib.parse, tempfile

          BASE_URL = "https://animalhealth.pk"

          def get_clean_slug(name):
              if not name: return ""
              name = name.lower()
              name = re.sub(r'&', 'and', name)
              name = re.sub(r'\s+', '-', name)
              name = re.sub(r'[^a-z0-9-]', '', name)
              return name

          # --- Check if Firebase service account is available ---
          sa_json = os.environ.get('FIREBASE_SERVICE_ACCOUNT', '')

          if sa_json and sa_json.strip() != '':
              # ── Read from Firestore (primary source after Firebase migration) ──
              import firebase_admin
              from firebase_admin import credentials, firestore

              with tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False) as f:
                  f.write(sa_json)
                  sa_path = f.name

              cred = credentials.Certificate(sa_path)
              firebase_admin.initialize_app(cred)
              db = firestore.client()

              try:
                  docs = db.collection('products').order_by('category').order_by('sortOrder').stream()
                  rows = []
                  for doc in docs:
                      d = doc.to_dict()
                      name = (d.get('name') or '').strip()
                      if not name: continue
                      rows.append({
                          'name':         name,
                          'category':     (d.get('category') or '').strip(),
                          'desc':         (d.get('desc') or '').strip(),
                          'images':       d.get('images') or [],
                          'priceDisplay': (d.get('priceDisplay') or '').strip(),
                          'inStock':      d.get('inStock', True),
                      })
                  print(f"Loaded {len(rows)} products from Firestore.")
              except Exception as e:
                  print(f"Firestore error: {e}")
                  exit(1)

          else:
              # ── Fallback: read from Google Sheets (pre-migration) ──
              import csv, requests
              SHEET_URL = "https://docs.google.com/spreadsheets/d/1-s7frQnY1Muh4XOizcz2V3KnkkHV8owNWYzyDrYFSic/gviz/tq?tqx=out:csv"
              try:
                  response = requests.get(SHEET_URL)
                  response.raise_for_status()
                  decoded_content = response.content.decode('utf-8')
                  cr = csv.reader(decoded_content.splitlines(), delimiter=',')
                  sheet_rows = list(cr)
                  rows = []
                  for row in sheet_rows[1:]:
                      if len(row) < 2 or not row[1].strip(): continue
                      rows.append({
                          'name':         row[1].strip(),
                          'category':     row[0].strip() if len(row) > 0 else '',
                          'desc':         row[2].strip() if len(row) > 2 else '',
                          'images':       [u.strip() for u in (row[3].split(',') if len(row) > 3 else []) if len(u.strip()) > 5],
                          'priceDisplay': '',
                          'inStock':      True,
                      })
                  print(f"Loaded {len(rows)} products from Google Sheets (fallback).")
              except Exception as e:
                  print(f"Google Sheets error: {e}")
                  exit(1)

          # ── Generate /s/ redirect files and products.json ──
          if not os.path.exists('s'):
              os.makedirs('s')

          for f in os.listdir('s'):
              if f.endswith('.html'):
                  os.remove(os.path.join('s', f))

          products_data = []

          for p in rows:
              name  = p['name']
              desc  = p['desc']
              imgs  = p['images']
              slug  = get_clean_slug(name)
              img   = imgs[0] if imgs else "https://tahirqadri88.github.io/khybertraders/images/website%20banner.jpg"
              target = f"{BASE_URL}/?item={urllib.parse.quote(name)}"

              file_content = f"""<!DOCTYPE html><html><head><meta charset="UTF-8">
              <title>{name} | AnimalHealth.pk</title>
              <meta property="og:title" content="{name}">
              <meta property="og:description" content="{desc[:150]}">
              <meta property="og:image" content="{img}">
              <meta property="og:url" content="{target}">
              <meta property="og:type" content="website">
              <meta http-equiv="refresh" content="0;url={target}" />
              </head><body style="font-family:sans-serif;text-align:center;padding-top:50px;">
              <p>Redirecting to <strong>{name}</strong>...</p>
              <script>window.location.href="{target}";<\/script>
              </body></html>"""

              with open(f"s/{slug}.html", "w", encoding="utf-8") as fh:
                  fh.write(file_content)

              products_data.append({
                  "category":     p['category'],
                  "name":         name,
                  "slug":         slug,
                  "inStock":      p['inStock'],
                  "priceDisplay": p['priceDisplay'],
              })

          with open("products.json", "w", encoding="utf-8") as jf:
              json.dump(products_data, jf, ensure_ascii=False, indent=2)

          print(f"Generated {len(products_data)} redirect files and products.json.")

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Product-Bot"
          git config --global user.email "bot@animalhealth.pk"
          git add s/ products.json
          if git diff --staged --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Auto-sync products: $(date)"
            git pull --rebase origin main
            git push origin main
          fi
